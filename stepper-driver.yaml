esphome:
  name: stepper-driver
  friendly_name: "Antenna Tuner"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  reboot_timeout: 0s
  encryption:
    key: 

ota:
  - platform: esphome
    password: 

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:
  version: 3


output:
  - platform: gpio
    pin: 
      number: GPIO27
      inverted: False
    id: gpio_stepper_sleep
    
switch:
  - platform: output
    name: "Motor on"
    id: stepper_slp
    output: gpio_stepper_sleep
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on: 
      then:
        - script.execute: motor_auto_sleep


stepper:
  - platform: a4988
    id: my_stepper
    dir_pin: GPIO12
    step_pin: GPIO14
    # sleep_pin: GPIO27
    max_speed: 1600 steps/s
    

    # Optional:
    acceleration: 1600
    deceleration: 1600

binary_sensor:
  - platform: gpio
    pin: 
      number: GPIO33
      mode: 
        input: true
        pulldown: true
    name: Min position switch
    id: min_pos
    on_press: 
      then:
        - stepper.report_position: 
            id: my_stepper
            position: !lambda 'return id(position).traits.get_min_value();'

  - platform: gpio
    pin: 
      number: GPIO32
      mode: 
        input: true
        pulldown: true
    name: Max position switch
    id: max_pos
    on_press: 
      then:
        - stepper.report_position: 
            id: my_stepper
            position: !lambda 'return id(position).traits.get_max_value();'
  - platform: template
    name: "Motor in motion"
    id: motor_in_motion
    lambda: 'return id(my_stepper).current_position != id(my_stepper).target_position;'

number:
  - platform: template
    max_value: 830
    min_value: -830
    initial_value: -830
    step: 5
    id: position
    name: Stepper target position
    optimistic: True
    restore_value: True
    set_action:
      then:
        - if:
            condition:
              - switch.is_off: stepper_slp
            then:
              - switch.turn_on: stepper_slp
        - stepper.set_target:
            id: my_stepper
            target: !lambda 'return x;'
        # need to execute this to reset the motor sleep timer!
        - script.execute: motor_auto_sleep


button:
  - platform: template
    name: 40m
    id: preset_40m_button
    on_press:
      - number.set: 
          id: position
          value: -290
  - platform: template
    name: 80m
    id: preset_80m_button
    on_press:
      - number.set: 
          id: position
          value: 345
  - platform: template
    name: 20m
    id: preset_20m_button
    on_press:
      - number.set: 
          id: position
          value: -735
          
  - platform: template
    name: Tune down
    id: stepup_button
    on_press:
      - number.increment: 
          id: position
          cycle: False
          
  - platform: template
    name: Tune up
    id: stepdown_button
    on_press:
      - number.decrement: 
          id: position
          cycle: False

  - platform: template
    name: Home stepper
    id: home_button
    on_press: 
      then:
       - script.execute: home_stepper


script:
  - id: home_stepper
    mode: restart
    then:
      - logger.log: "Homing min/max positions, please wait."
      - number.to_max: position
      - wait_until: 
          condition: 
            or:
              - binary_sensor.is_on: max_pos
          timeout: 5s
      - number.to_min: position
      - wait_until: 
          condition: 
            or:
              - binary_sensor.is_on: min_pos
          timeout: 5s
      - logger.log: "Homing done"
      

  - id: motor_auto_sleep
    mode: restart
    then: 
      - while:
          condition:
            - binary_sensor.is_on: motor_in_motion
          then:
            - logger.log: "Stepper in motion..."
            - delay: 0.5s
      - delay: 5s
      - switch.turn_off: stepper_slp